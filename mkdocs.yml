site_name: ffTRF
site_description: Frequency-domain temporal response functions in Python
site_url: https://weigla.github.io/ffTRF/
repo_url: https://github.com/weigla/ffTRF
repo_name: weigla/ffTRF
edit_uri: edit/main/docs/
theme:
  name: material

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            docstring_style: numpy
            heading_level: 2
            show_root_heading: true
            show_source: false

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Guides:
      - Core Workflow: guides/core-workflow.md
      - Inputs and Shapes: guides/inputs-and-shapes.md
      - Regularization and CV: guides/regularization.md
      - Multitaper Estimation: guides/multitaper.md
      - Frequency-Resolved Analysis: guides/frequency-resolved.md
      - Diagnostics and Transfer Functions: guides/diagnostics-and-transfer-functions.md
      - Trial Weighting and Bootstrap: guides/trial-weighting-and-bootstrap.md
  - Examples: examples.md
  - Reference:
      - Overview: reference/index.md
      - TRF Estimator: reference/trf.md
      - Result Containers: reference/results.md
      - Metrics: reference/metrics.md
      - Preprocessing Helpers: reference/preprocessing.md
  - Development: development.md
