name: docs

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MPLBACKEND: Agg
      MPLCONFIGDIR: /tmp/matplotlib
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Set up Pixi
        uses: prefix-dev/setup-pixi@v0.9.3
        with:
          manifest-path: pyproject.toml
          environments: docs
          locked: true
          cache: true

      - name: Show docs toolchain
        run: |
          pixi run -e docs python -c "import importlib.metadata as md; print('python', __import__('sys').version.split()[0]); print('mkdocs', md.version('mkdocs')); print('mkdocs-jupyter', md.version('mkdocs-jupyter')); print('mkdocs-material', md.version('mkdocs-material')); print('nbconvert', md.version('nbconvert'))"

      - name: Build docs
        run: pixi run -e docs docs-build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
